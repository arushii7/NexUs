<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexUs — Upload Resource</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-wrapper">
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">
      <span class="brand-name">NexUs</span>
      <span class="brand-tagline">for students, by students</span>
    </a>
    <div class="navbar-actions">
      <a href="profile.html" class="nav-avatar">A</a>
    </div>
  </nav>
  <div class="context-bar"><strong>Bennett University</strong> · Student &nbsp;|&nbsp; Upload Resource</div>

  <div class="main-layout">
    <div class="feed-col">
      <div class="content-box fade-in" style="max-width:560px;">
        <h1 style="font-family:var(--font-display);font-size:26px;font-weight:700;margin-bottom:6px;">Share a Resource</h1>
        <p style="font-size:13px;color:var(--gray-400);margin-bottom:24px;">Help your fellow students by sharing notes, papers, or useful links.</p>

        <form id="upload-resource-form">
          <div class="form-group">
            <label class="form-label">Resource Title</label>
            <input type="text" class="form-input" placeholder="e.g. DBMS Complete Notes" required>
          </div>
          <div class="form-group">
            <label class="form-label">Subject / Course</label>
            <input type="text" class="form-input" placeholder="e.g. Cloud Computing">
          </div>
          <div class="form-group">
            <label class="form-label">Year Relevance</label>
            <select class="form-select">
              <option>1st Year</option>
              <option selected>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
              <option>All Years</option>
            </select>
          </div>
          
          <div class="form-group">
            
            <div class="form-group">
<label class="form-label">Upload File</label>
<input type="file" id="resource-file" class="form-input">
</div>
          </div>
          <div class="form-group">
            <label class="form-label">Description (optional)</label>
            <textarea class="form-textarea" placeholder="Brief description of what this resource covers..." rows="4"></textarea>
          </div>

          <div style="display:flex;gap:10px;justify-content:flex-end;">
            <a href="resources.html" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Upload Resource</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1480.0.min.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
