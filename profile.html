<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexUs — Profile</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-wrapper">
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">
      <span class="brand-name">NexUs</span>
      <span class="brand-tagline">for students, by students</span>
    </a>
    <div class="navbar-actions">
      <a href="profile.html" class="nav-avatar">A</a>
    </div>
  </nav>
  <div class="context-bar"><strong>Bennett University</strong> · Student &nbsp;|&nbsp; Profile</div>

  <div class="main-layout">
    <!-- LEFT: Profile info -->
    <div style="width:280px;flex-shrink:0;">
      <div class="content-box fade-in">
        <div class="profile-avatar-lg">A</div>
        <div class="profile-name"></div>
        <div class="profile-sub"></div>
        <hr class="divider">

        <div class="form-label">About You</div>
        <div class="info-field"></div>

        <div class="form-label">Name</div>
        <div class="info-field"></div>

        <div class="form-label">Year</div>
        <div class="info-field"></div>

        <div class="form-label">Course</div>
        <div class="info-field"></div>

        <div class="form-label">University</div>
        <div class="info-field">Bennett University</div>

        <div style="display:flex;gap:8px;margin-top:16px;">
          <a href="edit-profile.html" class="btn btn-primary btn-sm" style="flex:1;justify-content:center;">Edit Profile</a>
          </div>
      </div>
    </div>

    <!-- RIGHT: Posts -->
    <div class="feed-col">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h2 style="font-family:var(--font-display);font-size:22px;font-weight:700;">Your Posts</h2>

        <a href="create-post.html" class="btn btn-primary btn-sm">+ New Post</a>
      </div>

      <div id="user-posts"></div>

      <p style="text-align:center;font-size:13px;color:var(--gray-400);padding:16px 0;">That's All!</p>

      
</div>
<script type="module" src="main.js"></script>
</body>
</html>
