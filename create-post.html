<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexUs — New Post</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-wrapper">
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">
      <span class="brand-name">NexUs</span>
      <span class="brand-tagline">for students, by students</span>
    </a>
    <div class="navbar-actions">
      <a href="search.html" class="nav-icon-btn">🔍</a>
      <button class="nav-icon-btn" onclick="window.location='notifications.html'">🔔<span class="notif-badge"></span></button>
      <a href="profile.html" class="nav-avatar">A</a>
    </div>
  </nav>
  <div class="context-bar"><strong>Bennett University</strong> · Student &nbsp;|&nbsp; New Post</div>

  <div class="main-layout">
    <div class="feed-col">
      <div class="content-box fade-in">
        <h1 style="font-family:var(--font-display);font-size:28px;font-weight:700;margin-bottom:20px;">What's on your mind?</h1>
        <form id="create-post-form">
          <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" class="form-input" placeholder="Give your post a title..." required>
          </div>

          <div class="form-group">
            <label class="form-label">Tag</label>
            <div class="tags-group">
              <label class="tag-check-label"><input type="radio" name="tag" value="academics" checked> Academics</label>
              <label class="tag-check-label"><input type="radio" name="tag" value="resources"> Resources</label>
              <label class="tag-check-label"><input type="radio" name="tag" value="rants"> Rants</label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Content</label>
            <textarea class="form-textarea editor-textarea" placeholder="Write your post here..." rows="8" required></textarea>
          </div>

          <div style="display:flex;gap:10px;justify-content:flex-end;">
            <a href="home.html" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Publish Post</button>
          </div>
        </form>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-card">
        <div class="sidebar-title">Quick Actions</div>
        <a href="create-post.html" class="quick-action-btn primary">
          <span class="qa-icon">✚</span> New Post
        </a>
        <a href="upload-resource.html" class="quick-action-btn primary">
          <span class="qa-icon">📎</span> Upload Resource
        </a>
      </div>
    </aside>
  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
