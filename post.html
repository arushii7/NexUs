<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexUs — Post</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-wrapper">
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">
      <span class="brand-name">NexUs</span>
      <span class="brand-tagline">for students, by students</span>
    </a>
    <div class="navbar-actions">
      <a href="profile.html" class="nav-avatar">A</a>
    </div>
  </nav>
  <div class="context-bar"><strong>Bennett University</strong> · Student &nbsp;|&nbsp; Post</div>

  <div class="main-layout">
    <div class="feed-col">
      <!-- Back -->
      <a href="home.html" class="btn btn-secondary btn-sm" style="margin-bottom:16px;display:inline-flex;">← Back to feed</a>

      <!-- Main Post -->
      <div class="content-box fade-in" style="margin-bottom:16px;">
        <span class="post-tag tag-clubs" style="margin-bottom:10px;display:inline-block;"></span>
        <h1 style="font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:8px;"></h1>
        
        <div class="post-body post-body-full" style="font-size:15px;line-height:1.7;"></div>

        
      </div>

      <!-- Comment Form -->
      <div class="content-box" style="margin-bottom:16px;">
        <div style="font-weight:600;font-size:14px;margin-bottom:10px;">Leave a comment</div>
        <form id="comment-form" style="display:flex;gap:8px;">
          <input type="text" class="form-input" placeholder="Write a comment..." style="flex:1;" required>
          <button type="submit" class="btn btn-primary">Post</button>
        </form>
      </div>

      <!-- Comments -->
      <div class="content-box">
        <div style="font-weight:700;font-size:14px;margin-bottom:12px;">Comments</div>
        <div id="comments-list">
    
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <div class="sidebar-title">Quick Actions</div>
        <a href="create-post.html" class="quick-action-btn primary">
          <span class="qa-icon">✚</span> New Post
        </a>
        <a href="home.html?tag=resources" class="quick-action-btn">
<span class="qa-icon">📄</span> Resources
</a>

<a href="home.html?tag=rants" class="quick-action-btn">
<span class="qa-icon">🗣️</span> Rants
</a>

<a href="home.html?tag=academics" class="quick-action-btn">
<span class="qa-icon">🧑‍💻</span> Academics
</a>
        <a href="profile.html" class="quick-action-btn">
          <span class="qa-icon">👤</span> Profile
        </a>
      </div>
    </aside>
  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
