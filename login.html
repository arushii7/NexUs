<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexUs</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card fade-in">
    <div class="login-brand">NexUs</div>
    <div class="login-tagline">for students, by students</div>
    <form id="login-form" class="login-fields">
      <div class="form-group">
        <label class="form-label">University</label>
        <select class="form-select">
          <option value="">Select your University!</option>
          <option value="bennett">Bennett University</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">University Email</label>
        <input type="email" id="email" class="form-input" placeholder="email@bennett.edu.in" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Continue</button>
    </form>
  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
