<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexUs — Welcome!</title>
<link rel="stylesheet" href="styles.css">
<style>
  .onboarding-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    padding: 24px 16px;
  }

  .onboarding-card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 44px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: var(--shadow-lg);
  }

  .onboarding-step {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gray-300);
  }
  .step-dot.active { background: var(--green); width: 24px; border-radius: 4px; }

  .onboarding-brand {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .onboarding-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .onboarding-sub {
    font-size: 13px;
    color: var(--gray-400);
    margin-bottom: 28px;
    font-style: italic;
  }

  .email-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green-dark);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 24px;
  }

  @media (max-width: 520px) {
    .onboarding-card { padding: 28px 20px; }
  }
</style>
</head>
<body>
<div class="onboarding-page">
  <div class="onboarding-card fade-in">
    <!-- Progress dots -->
    <div class="onboarding-step">
      <div class="step-dot"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>

    <div class="onboarding-brand">NexUs</div>
    <div class="onboarding-title">Set up your profile 👋</div>
    <div class="onboarding-sub">Tell us a bit about yourself so others know who you are.</div>

    

    <form id="onboarding-form">

      <div class="form-group">
        <label class="form-label">Your Name <span style="color:#e53e3e">*</span></label>
        <input
          type="text"
          id="ob-name"
          class="form-input"
          placeholder="your name"
          required
          autocomplete="name"
        >
      </div>

      <div class="form-group">
        <label class="form-label">Year <span style="color:#e53e3e">*</span></label>
        <select id="ob-year" class="form-select" required>
          <option value="">Select your year</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
          <option value="5">5th Year</option>
          <option value="alumni">Alumni</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Course <span style="color:#e53e3e">*</span></label>
        <select id="ob-course" class="form-select" required>
          <option value="">Select your course</option>
          <optgroup label="B.Tech">
            <option value="B.Tech CSE">B.Tech Computer Science (CSE)</option>
            <option value="B.Tech CSE AI">B.Tech CSE — AI & ML</option>
            <option value="B.Tech CSE DS">B.Tech CSE — Data Science</option>
            <option value="B.Tech CSE Cyber">B.Tech CSE — Cybersecurity</option>
            <option value="B.Tech IT">B.Tech Information Technology (IT)</option>
            <option value="B.Tech ECE">B.Tech Electronics & Communication (ECE)</option>
            <option value="B.Tech ME">B.Tech Mechanical Engineering</option>
            <option value="B.Tech CE">B.Tech Civil Engineering</option>
          </optgroup>
          <optgroup label="BBA / MBA">
            <option value="BBA">BBA</option>
            <option value="BBA Digital">BBA — Digital Marketing</option>
            <option value="MBA">MBA</option>
            <option value="MBA Tech">MBA — Technology Management</option>
          </optgroup>
          <optgroup label="Law">
            <option value="BA LLB">BA LLB</option>
            <option value="BBA LLB">BBA LLB</option>
          </optgroup>
          <optgroup label="Other">
            <option value="B.Sc">B.Sc</option>
            <option value="Other">Other</option>
          </optgroup>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">About You <span style="color:var(--gray-400);font-weight:400;">(optional)</span></label>
        <textarea
          id="ob-about"
          class="form-textarea"
          rows="3"
          placeholder="tell us about you!"
        ></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px;">
        Let's Go → 
      </button>
    </form>
  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
